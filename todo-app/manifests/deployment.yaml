apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes: # Define volume
        - name: shared-logs
          persistentVolumeClaim:
            claimName: image-claim
      containers:
        - name: todo-app
          image: todo-app
          volumeMounts: # Mount volume
          - name: shared-logs
            mountPath: /usr/src/app/files
          env:
          - name: PORT
            value: "3000"
          