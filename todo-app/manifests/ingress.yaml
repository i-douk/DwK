apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dwk-todo-app-ingress
spec:
  rules:
  - http:
      paths:
      - path: /todos
        pathType: Prefix
        backend:
          service:
            name: todo-app-svc
            port:
              number: 2345
      - path: /addtodo  # Add this path to handle the POST request
        pathType: Prefix
        backend:
          service:
            name: todo-app-svc
            port:
              number: 2345
