apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dwk-log-output-ingress
spec:
  rules:
  - http:
      paths:
      - path: /logs
        pathType: Prefix
        backend:
          service:
            name: log-output-svc
            port:
              number: 2345
      - path: /pingpong
        pathType: Prefix
        backend:
          service:
            name: ping-pong-svc
            port:
              number: 2345
      - path: /pingponglog
        pathType: Prefix
        backend:
          service:
            name: ping-pong-svc
            port:
              number: 2345
