apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dwk-todo-app-ingress
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /hellokube
        pathType: Prefix
        backend:
          service:
            name: todo-app-svc
            port:
              number: 2345
      - path: /pingpong
        pathType: Prefix
        backend:
          service:
            name: ping-pong-svc
            port:
              number: 2345
