apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      # volumes: # Define volume
      #   - name: shared-logs
      #     persistentVolumeClaim:
      #       claimName: image-claim
      containers:
        - name: ping-pong
          image: ping-pong
          env:
          - name: PORT
            value: "3001"
          # volumeMounts:
          #     - name: shared-logs
          #       mountPath: /usr/src/app/files